<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div id="display">0</div>
        <div class="buttons" id="btn-container">
            <button class="clear" data-type="clear">AC</button>
            <button class="operator" data-type="delete">DEL</button>
            <button class="operator" data-type="operator">/</button>
            <button class="operator" data-type="operator">*</button>
            
            <button data-type="number">7</button>
            <button data-type="number">8</button>
            <button data-type="number">9</button>
            <button class="operator" data-type="operator">-</button>
            
            <button data-type="number">4</button>
            <button data-type="number">5</button>
            <button data-type="number">6</button>
            <button class="operator" data-type="operator">+</button>
            
            <button data-type="number">1</button>
            <button data-type="number">2</button>
            <button data-type="number">3</button>
            <button data-type="number">.</button>
            
            <button data-type="number">0</button>
            <button data-type="number">00</button>
            <button class="equal" data-type="equal">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
